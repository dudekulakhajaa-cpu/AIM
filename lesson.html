<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AIM Interactive Lesson Engine — Learn Game Development with structured, interactive C++ and Math lessons.">
    <title>AIM — Interactive Lesson Engine</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="src/lesson/lesson.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Skip to Content (Accessibility) -->
    <a href="#lesson-workspace" class="skip-link">Skip to content</a>

    <!-- Reading Progress Bar -->
    <div class="scroll-progress-container" role="progressbar" aria-label="Reading progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="scroll-progress-fill" id="scroll-progress-fill"></div>
    </div>

    <div class="lesson-app-container">
        <!-- Sidebar Drawer Navigation -->
        <aside class="lesson-sidebar" id="lesson-sidebar-panel" aria-label="Course navigation">
            <!-- Sidebar content dynamically rendered by sidebar.js -->
        </aside>

        <!-- Main Wrapper -->
        <div class="lesson-main-wrapper">
            <!-- Mobile Header Bar -->
            <div class="mobile-nav-bar">
                <button class="hamburger-btn" id="mobile-hamburger-btn"
                        aria-label="Open navigation menu"
                        aria-expanded="false"
                        aria-controls="lesson-sidebar-panel">☰</button>
                <div class="sidebar-logo" style="margin-right: auto; margin-left: 16px;">AIM <span>GAME DEV</span></div>
            </div>

            <!-- Content Area -->
            <main class="lesson-content-container" id="main-content-layout" role="main">
                <!-- Breadcrumbs -->
                <nav class="breadcrumbs" id="lesson-breadcrumbs" aria-label="Breadcrumb"></nav>

                <!-- Loading / Error States -->
                <div id="engine-status-overlay" class="hidden" aria-live="polite"></div>

                <!-- Interactive Lesson Elements -->
                <div id="lesson-workspace">
                    <!-- Header Card -->
                    <header class="lesson-header-card" id="lesson-header-section"></header>

                    <!-- Learning Objectives -->
                    <section class="objectives-card hidden" id="lesson-objectives-section"
                             aria-label="Learning objectives"></section>

                    <!-- Content Sections (Theory, Examples, Notes, Tips) -->
                    <section class="lesson-sections-wrapper" id="lesson-content-sections"
                             aria-label="Lesson content"></section>

                    <!-- Navigation Footer (Previous/Next) -->
                    <nav class="lesson-navigation-footer" id="navigation-footer"
                         aria-label="Lesson navigation"></nav>

                    <!-- Footer (Completion + Copyright) -->
                    <footer class="lesson-footer-section" id="lesson-footer-section"></footer>
                </div>
            </main>
        </div>
    </div>

    <!-- Main Module Orchestration Script -->
    <script type="module">
        import { initRouter, navigateToLesson } from './src/lesson/lesson-router.js';
        import { loadLesson, getProgressState, saveProgressState, syncDatabaseWithCache } from './src/lesson/lesson-loader.js';
        import { renderLessonPage } from './src/lesson/lesson-renderer.js';
        import { initScrollProgress } from './src/lesson/lesson-navigation.js';
        import { renderErrorPage, renderLoadingState } from './src/lesson/error-renderer.js';
        import { ERROR_CODES } from './src/lesson/constants.js';

        // DOM elements cache
        const elements = {
            sidebar: document.getElementById('lesson-sidebar-panel'),
            breadcrumbs: document.getElementById('lesson-breadcrumbs'),
            header: document.getElementById('lesson-header-section'),
            objectives: document.getElementById('lesson-objectives-section'),
            content: document.getElementById('lesson-content-sections'),
            footer: document.getElementById('lesson-footer-section'),
            workspace: document.getElementById('lesson-workspace'),
            statusOverlay: document.getElementById('engine-status-overlay'),
            hamburger: document.getElementById('mobile-hamburger-btn')
        };

        // Mobile hamburger toggle
        if (elements.hamburger) {
            elements.hamburger.addEventListener('click', () => {
                const isOpen = elements.sidebar.classList.toggle('open');
                elements.hamburger.setAttribute('aria-expanded', isOpen);
            });

            // Close sidebar when clicking outside on mobile
            document.addEventListener('click', (e) => {
                if (elements.sidebar.classList.contains('open') &&
                    !elements.sidebar.contains(e.target) &&
                    !elements.hamburger.contains(e.target)) {
                    elements.sidebar.classList.remove('open');
                    elements.hamburger.setAttribute('aria-expanded', 'false');
                }
            });
        }

        /**
         * Main route handler — called by the router whenever the URL hash changes.
         */
        const handleRouteChanged = async (courseId, lessonId, is404 = false) => {
            showLoadingState();

            if (is404) {
                showError(ERROR_CODES.NOT_FOUND, {
                    details: `Unrecognized URL: ${window.location.hash}`
                });
                return;
            }

            try {
                // Sync local storage with DB state before rendering
                await syncDatabaseWithCache();

                // 1. Load lesson (outline + content + validation)
                const data = await loadLesson(courseId, lessonId);

                // 2. Get progress state
                const progressState = getProgressState();

                // 3. Define interaction handlers
                const handlers = {
                    onSelectLesson: (id) => navigateToLesson(courseId, id),
                    onToggleBookmark: (id) => {
                        const index = progressState.bookmarkIds.indexOf(id);
                        if (index === -1) {
                            progressState.bookmarkIds.push(id);
                        } else {
                            progressState.bookmarkIds.splice(index, 1);
                        }
                        saveProgressState(progressState.completedIds, progressState.bookmarkIds);
                        handleRouteChanged(courseId, lessonId);
                    },
                    onToggleComplete: (id) => {
                        const index = progressState.completedIds.indexOf(id);
                        if (index === -1) {
                            progressState.completedIds.push(id);
                        } else {
                            progressState.completedIds.splice(index, 1);
                        }
                        saveProgressState(progressState.completedIds, progressState.bookmarkIds);
                        handleRouteChanged(courseId, lessonId);
                    },
                    onShare: (id) => {
                        const url = `${window.location.origin}${window.location.pathname}#/lesson/${courseId}/${id}`;
                        navigator.clipboard.writeText(url);
                        alert('Lesson share link copied to clipboard!');
                    },
                    onNavigateHome: () => {
                        window.location.href = 'index.html';
                    }
                };

                // 4. Render the full lesson page
                renderLessonPage(elements, data, progressState, handlers);

                // 5. Reset scroll and update reading progress
                window.scrollTo(0, 0);
                initScrollProgress();

                showContentState();
            } catch (err) {
                // Structured errors from lesson-loader have a .code property
                if (err && err.code) {
                    showError(err.code, {
                        details: err.details || err.message,
                        courseId,
                        lessonId
                    });
                } else {
                    showError(ERROR_CODES.LOAD_FAILURE, {
                        details: err?.message || 'An unexpected error occurred.',
                        courseId,
                        lessonId
                    });
                }
            }
        };

        // State transition helpers
        function showLoadingState() {
            elements.workspace.classList.add('hidden');
            elements.statusOverlay.classList.remove('hidden');
            renderLoadingState(elements.statusOverlay);
        }

        function showError(errorCode, options) {
            elements.workspace.classList.add('hidden');
            elements.statusOverlay.classList.remove('hidden');
            renderErrorPage(elements.statusOverlay, errorCode, options);
        }

        function showContentState() {
            elements.statusOverlay.classList.add('hidden');
            elements.workspace.classList.remove('hidden');
        }

        // Initialize Router
        initRouter(handleRouteChanged);
    </script>
</body>
</html>
